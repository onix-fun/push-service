openapi: 3.1.0
info: { title: Push Service API, version: 1.0.0-rc.1 }
paths:
  /v1/devices/{id}:
    put:
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/Device" } } } }
      responses: { "204": { description: Registered } }
    delete:
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses: { "204": { description: Deactivated } }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
  schemas:
    Device:
      type: object
      required: [recipient_id, provider, token]
      properties:
        recipient_id: { type: string }
        provider: { enum: [fcm, apns, web_push] }
        token: { type: string }
